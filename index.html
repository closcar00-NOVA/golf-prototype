<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Physics Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div class="ui-box">
            <span class="label">HOLE</span>
            <span id="ui-hole" class="value">1</span>
        </div>
        <div class="ui-box">
            <span class="label">PAR</span>
            <span id="ui-par" class="value">3</span>
        </div>
        <div class="ui-box">
            <span class="label">STROKES</span>
            <span id="ui-strokes" class="value">0</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="levels.js"></script>
    <script src="app.js"></script>
</body>
</html>
